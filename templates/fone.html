<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Intervexa Resume | Password Recovery</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(135deg,#08152d 0%,#0d2348 40%,#173d8f 100%);

overflow:hidden;

position:relative;

}

/* Background Glow */

body::before{

content:"";

position:absolute;

top:-180px;

left:-180px;

width:420px;

height:420px;

background:#2563eb55;

border-radius:50%;

filter:blur(140px);

}

body::after{

content:"";

position:absolute;

bottom:-180px;

right:-180px;

width:420px;

height:420px;

background:#7c3aed55;

border-radius:50%;

filter:blur(140px);

}

/* Container */

.container{

width:100%;

max-width:500px;

padding:25px;

position:relative;

z-index:2;

}

/* Glass Card */

.card{

background:rgba(12,22,45,.55);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:28px;

padding:55px 45px;

text-align:center;

box-shadow:
0 15px 45px rgba(0,0,0,.35);

animation:fadeUp .8s ease;

}

/* Lock Icon */

.icon{

width:90px;

height:90px;

margin:auto;

margin-bottom:22px;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(135deg,#2563eb,#8b5cf6);

box-shadow:
0 0 35px rgba(79,70,229,.5);

font-size:38px;

color:#fff;

animation:float 3s infinite ease-in-out;

}

/* Heading */

.card h1{

font-size:42px;

font-weight:800;

color:#fff;

margin-bottom:12px;

}

.card p{

font-size:17px;

color:#c8d6f4;

line-height:1.7;

margin-bottom:40px;

}

/* Input */

.input-box{

position:relative;

margin-bottom:35px;

}

.input-box i{

position:absolute;

left:24px;

top:50%;

transform:translateY(-50%);

font-size:22px;

color:#8fb4ff;

}

.input-box input{

width:100%;

height:68px;

padding-left:65px;

padding-right:20px;

border-radius:50px;

outline:none;

border:2px solid rgba(125,155,255,.35);

background:rgba(255,255,255,.05);

color:#fff;

font-size:17px;

transition:.35s;

}

.input-box input::placeholder{

color:#8fa9d9;

}

.input-box input:focus{

border-color:#4f8fff;

box-shadow:
0 0 18px rgba(79,143,255,.35);

}

/* Button */

button{

width:100%;

height:65px;

border:none;

border-radius:50px;

cursor:pointer;

font-size:20px;

font-weight:700;

color:#fff;

background:
linear-gradient(135deg,#2563eb,#7c3aed);

transition:.35s;

box-shadow:
0 12px 30px rgba(37,99,235,.35);

}

button:hover{

transform:translateY(-4px);

box-shadow:
0 18px 40px rgba(37,99,235,.45);

}

/* Success Message */

.success{

display:none;

margin-top:25px;

color:#74f0a7;

font-size:16px;

font-weight:600;

}

/* Animations */

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-8px);

}

}
/* Responsive */

@media (max-width:768px){

.container{

padding:20px;

}

.card{

padding:40px 25px;

border-radius:22px;

}

.icon{

width:75px;
height:75px;
font-size:30px;

}

.card h1{

font-size:32px;

}

.card p{

font-size:15px;

margin-bottom:30px;

}

.input-box input{

height:60px;

font-size:16px;

padding-left:58px;

}

button{

height:58px;

font-size:18px;

}

}

@media (max-width:480px){

.card{

padding:35px 20px;

}

.card h1{

font-size:28px;

}

.card p{

font-size:14px;

}

.icon{

width:68px;

height:68px;

font-size:28px;

}

.input-box input{

height:56px;

font-size:15px;

padding-left:55px;

}

button{

height:56px;

font-size:17px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="icon">
<i class="fa-solid fa-lock"></i>
</div>

<h1>Password Recovery</h1>

<p>
Enter your registered email address to recover your password.
We'll send you a secure password reset link.
</p>

<form method="POST">

<div class="input-box">

<i class="fa-regular fa-envelope"></i>

<input
type="email"
name="email"
placeholder="Enter your email address"
required>

</div>

<button type="submit">

Recover Password

</button>

<div class="success" id="successMessage">

<i class="fa-solid fa-circle-check"></i>

&nbsp;

Recovery link sent successfully!

</div>

</form>

</div>

</div>
</body>

</html>
