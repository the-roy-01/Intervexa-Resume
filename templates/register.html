<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Intervexa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: url('{{url_for("static", filename="background.jpeg")}}') no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Dark overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(5, 20, 50, 0.7);
}

/* Main Card */
.container {
    position: relative;
    width: 320px;
    padding: 30px 25px;
    border-radius: 25px;
    border: 3px solid #fcfffe;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 25px rgba(47, 0, 255, 0.489);
    z-index: 1;
    text-align: center;
    animation: fadeIn 1s ease;
}

/* Glow animation border */
.container:hover {
    box-shadow: 0 0 40px rgba(111, 117, 237, 0.9);
    transform: translateY(-5px);
}

/* Title */
.container h2 {
    color: #fff;
    font-size: 28px;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

/* Inputs */
.input-box {
    margin-bottom: 18px;
}

.input-box input {
    width: 100%;
    padding: 15px 15px 15px 55px;
    border: none;
    border-radius: 30px;
    padding-left:45px;
   
}


.input-box ion-icon {
    position: absolute;
    margin-left: 20px;
    margin-top: 16px;
    color: #333;
}
/* Focus glow */
.input-box input:focus {
    background: #fff;
    box-shadow: 0 0 10px #5850f9;
}

/* Button */
.signup-btn {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(90deg, #6871ee, #0e1cae);
    color: #000;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

/* Button hover */
.signup-btn:hover {
    box-shadow: 0 0 20px #330fa9;
    transform: scale(1.05);
}

/* Click */
.signup-btn:active {
    transform: scale(0.97);
}

/* Fade animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.login.link {
    color: #9caaca;
    text-decoration: none;
    font-size: 14px;
}
</style>

</head>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<body>

<div class="container">
    <h2>REGISTER</h2>
<form action="/register" method="POST">
    <div class="input-box">
        <ion-icon name="person"></ion-icon>
        <input type="text" name="fullname" placeholder="Full name" required> 
    </div>
    <div class="input-box">
        <ion-icon name="mail"></ion-icon>
        <input type="email" name="email" placeholder="E-mail" required>
    </div>

    <div class="input-box">
        <ion-icon name="lock-closed"></ion-icon>
        <input type="password" name="password" placeholder="Password" required>
    </div>

    <div class="input-box">
        <ion-icon name="lock-closed"></ion-icon>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
    </div>

    <button type="submit" class="signup-btn">Sign-up</button>
    <br>
    <br>
    <a href='{{ url_for('login') }}' class="login link"> Already have an account? <b>Login</b></a>
</form>
</div>

</body>
</html>
