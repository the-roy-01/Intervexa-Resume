<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Intervexa Resume | OTP Verification</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#08152d 0%,#0d2348 45%,#173d8f 100%);

overflow:hidden;

position:relative;

}

/* Background Glow */

body::before{

content:"";

position:absolute;

width:420px;

height:420px;

background:#2563eb44;

border-radius:50%;

top:-180px;

left:-180px;

filter:blur(140px);

}

body::after{

content:"";

position:absolute;

width:420px;

height:420px;

background:#8b5cf644;

border-radius:50%;

bottom:-180px;

right:-180px;

filter:blur(140px);

}

/* Card */

.container{

width:100%;

max-width:470px;

padding:25px;

position:relative;

z-index:2;

}

.card{

background:rgba(12,22,45,.55);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:30px;

padding:55px 40px;

text-align:center;

box-shadow:0 18px 45px rgba(0,0,0,.35);

animation:fadeUp .8s ease;

}

/* Icon */

.icon{

width:88px;

height:88px;

margin:auto;

margin-bottom:25px;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#2563eb,#8b5cf6);

color:#fff;

font-size:34px;

box-shadow:0 0 35px rgba(79,70,229,.5);

animation:float 3s infinite ease-in-out;

}

/* Heading */

h1{

color:#fff;

font-size:40px;

font-weight:800;

margin-bottom:12px;

}

.subtitle{

color:#c5d3f3;

font-size:17px;

line-height:1.6;

margin-bottom:38px;

}

/* OTP */

.otp{

display:flex;

justify-content:center;

gap:14px;

margin-bottom:35px;

}

.otp input{

width:68px;

height:82px;

border:none;

outline:none;

border-radius:18px;

text-align:center;

font-size:28px;

font-weight:700;

background:#fff;

transition:.3s;

}

.otp input:focus{

transform:translateY(-4px);

box-shadow:0 0 18px rgba(37,99,235,.45);

}

/* Timer */

.timer{

font-size:22px;

color:#d9e5ff;

margin-bottom:30px;

}

.timer span{

font-weight:700;

color:#fff;

}

/* Buttons */

.verify{

width:100%;

height:62px;

border:none;

border-radius:50px;

font-size:21px;

font-weight:700;

cursor:pointer;

color:#fff;

background:linear-gradient(135deg,#2563eb,#4f8fff);

box-shadow:0 14px 30px rgba(37,99,235,.35);

transition:.35s;

margin-bottom:22px;

}

.verify:hover{

transform:translateY(-4px);

}

.resend{

width:100%;

height:62px;

border-radius:50px;

border:2px solid rgba(92,130,255,.5);

background:transparent;

color:#dfe9ff;

font-size:19px;

cursor:pointer;

transition:.35s;

}

.resend:hover{

background:rgba(255,255,255,.06);

}

/* Animations */

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-8px);

}

}
/* ===========================
   Responsive Design
=========================== */

@media (max-width:768px){

.container{
padding:20px;
}

.card{
padding:40px 28px;
border-radius:24px;
}

.icon{
width:72px;
height:72px;
font-size:28px;
}

h1{
font-size:34px;
}

.subtitle{
font-size:15px;
margin-bottom:30px;
}

.otp{
gap:10px;
}

.otp input{
width:58px;
height:72px;
font-size:24px;
}

.timer{
font-size:20px;
}

.verify,
.resend{
height:58px;
font-size:18px;
}

}

@media (max-width:480px){

.card{
padding:32px 20px;
}

h1{
font-size:28px;
}

.subtitle{
font-size:14px;
}

.otp{
gap:8px;
}

.otp input{
width:50px;
height:65px;
font-size:22px;
border-radius:14px;
}

.timer{
font-size:18px;
}

.verify,
.resend{
height:54px;
font-size:17px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="icon">
<i class="fa-solid fa-mobile-screen-button"></i>
</div>

<h1>Check your phone</h1>

<p class="subtitle">
We've sent the verification code to your phone.<br>
Please enter the 4-digit code below.
</p>

<div class="timer">

Code expires in :
<span id="countdown">03:12</span>

</div>

<form method="POST">

<div class="otp">

<input type="text" maxlength="1" class="otp-box">
<input type="text" maxlength="1" class="otp-box">
<input type="text" maxlength="1" class="otp-box">
<input type="text" maxlength="1" class="otp-box">

</div>

<input type="hidden" name="otp" id="otp">

<button type="submit" class="verify">
Verify
</button>

</form>

<button class="resend">

Send Again

</button>

</div>

</div>

<script>

const otp = document.querySelectorAll(".otp-box");

// Auto move to next box
otp.forEach((box, index) => {

    box.addEventListener("input", (e) => {

        e.target.value = e.target.value.replace(/[^0-9]/g, '');

        if (e.target.value && index < otp.length - 1) {
            otp[index + 1].focus();
        }

    });

    // Move back on backspace
    box.addEventListener("keydown", (e) => {

        if (e.key === "Backspace" && !box.value && index > 0) {
            otp[index - 1].focus();
        }

    });

});

// Countdown timer
let seconds = 192;

const timer = document.getElementById("countdown");

const countdown = setInterval(() => {

    if (seconds > 0) {

        seconds--;

        const m = Math.floor(seconds / 60);
        const s = seconds % 60;

        timer.textContent =
            String(m).padStart(2, '0') +
            ":" +
            String(s).padStart(2, '0');

    } else {

        clearInterval(countdown);
        timer.textContent = "00:00";

    }

}, 1000);

// Before submitting, combine all OTP digits
document.querySelector("form").addEventListener("submit", function(e) {

    let code = "";

    otp.forEach(input => {
        code += input.value;
    });

    if (code.length !== 4) {

        e.preventDefault();
        alert("Please enter the complete OTP.");
        return;

    }

    document.getElementById("otp").value = code;

});

// Resend button
document.querySelector(".resend").onclick = function() {

    alert("OTP resend functionality will be added later.");

};

</script>

</body>

</html>
